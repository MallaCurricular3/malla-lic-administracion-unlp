<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malla Licenciatura en Administración</title>

<style>
:root{
  --main:#540212;
  --bg:#0e0e0e;
  --card:#1b1b1b;
  --text:#f2f2f2;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:var(--text);
  background:#000;
  position:relative;
  overflow-x:hidden;
}

/* Fondo aesthetic */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 30%, #540212aa, transparent 40%),
    radial-gradient(circle at 80% 70%, #333333aa, transparent 40%),
    radial-gradient(circle at 50% 50%, #000000aa, transparent 60%);
  filter: blur(70px);
  transform: scale(1.3);
}

/* Header */
header{
  position:sticky;
  top:0;
  background:#000000aa;
  backdrop-filter:blur(6px);
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:10;
}

#progressText{
  font-weight:bold;
}

/* Layout */
.container{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  padding:20px;
}

.section{
  flex:1;
  min-width:280px;
}

.section h2{
  text-align:center;
}

/* Materias */
.subject{
  background:var(--card);
  border-left:4px solid var(--main);
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  cursor:pointer;
  position:relative;
  transition:0.25s;
}

.subject:hover{
  transform:scale(1.03);
}

.subject.locked{
  opacity:0.4;
  cursor:not-allowed;
}

/* APROBADA VINOTINTO */
.subject.completed{
  background:var(--main);
}

/* Tooltip correlativas */
.tooltip{
  position:absolute;
  top:-5px;
  right:-5px;
  background:#000;
  padding:5px 8px;
  font-size:11px;
  border-radius:6px;
  display:none;
  white-space:nowrap;
}

.subject:hover .tooltip{
  display:block;
}

/* Botones */
.controls{
  text-align:center;
  margin:30px 0;
}

button{
  background:var(--main);
  border:none;
  color:white;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  margin:5px;
}

button:hover{
  opacity:0.8;
}

/* Animación */
@keyframes unlock{
  0%{transform:scale(0.8);opacity:0}
  100%{transform:scale(1);opacity:1}
}

.subject.completed{
  animation:unlock 0.3s ease;
}

/* ===== MODO VERTICAL (tipo celular) ===== */
.vertical .container{
  flex-direction:column;
}

</style>
</head>

<body>

<header>
  <div>Licenciatura en Administración</div>
  <div id="progressText">0% completado</div>
</header>

<div class="container">

  <div class="section">
    <h2>Propedéutico</h2>
    <div id="propedeutico"></div>
  </div>

  <div class="section">
    <h2>Básico</h2>
    <div id="basico"></div>
  </div>

  <div class="section">
    <h2>Profesional</h2>
    <div id="profesional"></div>
  </div>

  <div class="section">
    <h2>Electivas</h2>
    <div id="electivas"></div>
  </div>

</div>

<div class="controls">
  <button onclick="toggleMode()" id="modeBtn">Modo vertical</button>
  <button onclick="resetAll()">Resetear</button>
</div>

<script>

/* ===== PLAN COMPLETO ===== */
const subjects = [

{code:"8.1.0",name:"Introducción a los Estudios Universitarios",cycle:"propedeutico",cor:[]},
{code:"8.1.2",name:"Introducción a la Economía y Estructura Económica Argentina",cycle:"propedeutico",cor:[]},
{code:"8.1.3",name:"Administración I",cycle:"propedeutico",cor:[]},
{code:"8.1.1",name:"Contabilidad I",cycle:"propedeutico",cor:[]},

{code:"8.1.4",name:"Microeconomía I",cycle:"basico",cor:["8.1.2"]},
{code:"8.1.5",name:"Matemática para Administradores",cycle:"basico",cor:["8.1.2"]},
{code:"8.1.6",name:"Comportamiento Humano en las Organizaciones",cycle:"basico",cor:["8.1.3"]},
{code:"8.1.7",name:"Pensamiento Social y Científico",cycle:"basico",cor:["8.1.3"]},

{code:"8.2.2",name:"Macroeconomía I",cycle:"basico",cor:["8.1.2"]},
{code:"8.2.1",name:"Interpretación de los Estados Contables",cycle:"basico",cor:["8.1.1"]},
{code:"8.2.3",name:"Administración Estratégica",cycle:"basico",cor:["8.1.3"]},

{code:"8.2.4",name:"Gestión Pública",cycle:"basico",cor:["8.1.6"]},
{code:"8.2.5",name:"Estadística Aplicada",cycle:"basico",cor:["8.1.5"]},
{code:"8.2.6",name:"Costos para la Gestión",cycle:"basico",cor:["8.1.3","8.1.5"]},
{code:"8.2.7",name:"Elementos del Derecho Público y Privado",cycle:"basico",cor:["8.1.7"]},

{code:"8.3.1",name:"Marketing Estratégico",cycle:"profesional",cor:["8.2.3"]},
{code:"8.3.2",name:"Diseño de Sistemas de Información",cycle:"profesional",cor:["8.1.7","8.2.3"]},
{code:"8.3.3",name:"Cálculo Financiero",cycle:"profesional",cor:["8.1.5","8.2.1","8.2.3"]},

{code:"8.3.4",name:"Gestión de las Personas I",cycle:"profesional",cor:["8.1.6","8.2.3"]},
{code:"8.3.5",name:"Planeamiento y Control Organizacional",cycle:"profesional",cor:["8.2.1","8.2.3","8.2.6"]},
{code:"8.3.6",name:"Operaciones",cycle:"profesional",cor:["8.2.3","8.2.6"]},

{code:"8.4.1",name:"Marketing Operativo",cycle:"profesional",cor:["8.2.5","8.3.1"]},
{code:"8.4.2",name:"Estrategia Tecnológica y Gestión de Proyectos IT",cycle:"profesional",cor:["8.3.2"]},
{code:"8.4.3",name:"Finanzas de Empresas",cycle:"profesional",cor:["8.3.3"]},

{code:"8.4.6",name:"Gestión de las Personas II",cycle:"profesional",cor:["8.3.4"]},
{code:"8.4.7",name:"Derecho Empresario",cycle:"profesional",cor:["8.2.7"]},
{code:"8.4.8",name:"Dirección General",cycle:"profesional",cor:["8.2.6","8.3.1","8.3.3","8.3.5"]},

{code:"8.4.4",name:"Finanzas Públicas",cycle:"electivas",cor:["8.1.4","8.1.7"]},
{code:"8.4.5",name:"Psicosociología Organizacional",cycle:"electivas",cor:["8.1.6"]},
{code:"8.4.9",name:"Finanzas Avanzadas",cycle:"electivas",cor:["8.4.3"]},
{code:"8.4.10",name:"Inteligencia de Negocios y Análisis de Datos",cycle:"electivas",cor:["8.2.3","8.2.5"]},
{code:"OPT",name:"Materia Optativa",cycle:"electivas",cor:[]}

];

const completed = new Set(JSON.parse(localStorage.getItem("done")||"[]"));

function createSubject(s){
  const div=document.createElement("div");
  div.className="subject";
  div.id=s.code;

  const tooltip=document.createElement("div");
  tooltip.className="tooltip";
  tooltip.innerText=s.cor.length?("Correlativas: "+s.cor.join(", ")):"Sin correlativas";

  div.innerHTML=`<strong>${s.code}</strong><br>${s.name}`;
  div.appendChild(tooltip);

  function unlocked(){
    return s.cor.every(c=>completed.has(c));
  }

  function refresh(){
    div.classList.toggle("locked",!unlocked());
    div.classList.toggle("completed",completed.has(s.code));
  }

  div.onclick=()=>{
    if(!unlocked()) return;
    if(completed.has(s.code)) completed.delete(s.code);
    else completed.add(s.code);
    localStorage.setItem("done",JSON.stringify([...completed]));
    updateAll();
  };

  refresh();
  return div;
}

function render(){
  subjects.forEach(s=>{
    const el=createSubject(s);
    document.getElementById(s.cycle).appendChild(el);
  });
}

render();

/* Progreso */
function updateProgress(){
  const total=subjects.length;
  const done=completed.size;
  const percent=Math.round(done/total*100);
  document.getElementById("progressText").innerText=
    percent+"% completado";
}

function updateAll(){
  document.querySelectorAll(".subject").forEach(el=>{
    const code=el.id;
    const subj=subjects.find(s=>s.code===code);
    if(!subj) return;

    const unlocked=subj.cor.every(c=>completed.has(c));

    el.classList.toggle("locked",!unlocked);
    el.classList.toggle("completed",completed.has(code));
  });

  updateProgress();
}

updateAll();

/* Botón modo */
function toggleMode(){
  document.body.classList.toggle("vertical");

  const btn=document.getElementById("modeBtn");

  if(document.body.classList.contains("vertical")){
    btn.innerText="Modo horizontal";
  }else{
    btn.innerText="Modo vertical";
  }
}

function resetAll(){
  completed.clear();
  localStorage.removeItem("done");
  updateAll();
}

</script>

</body>
</html>
