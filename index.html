<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Malla Lic. Administración UNLP</title>

<style>

:root{
  --primary:#540212;
  --bg:#0e0e11;
  --card:#1a1a22;
  --text:#f2f2f2;
}

/* Fondo aesthetic */
body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  color:var(--text);
  background:
  radial-gradient(circle at 20% 20%, #54021255, transparent 40%),
  radial-gradient(circle at 80% 30%, #222 0%, transparent 50%),
  radial-gradient(circle at 50% 80%, #000 0%, transparent 50%),
  #0b0b0f;
}

/* Layout */

.container{
  display:flex;
  gap:18px;
  padding:20px;
  overflow-x:auto;
}

.mobile .container{
  flex-direction:column;
  overflow-x:hidden;
}

/* Columnas */

.cycle{
  min-width:260px;
  background:var(--card);
  border-radius:14px;
  padding:12px;
  box-shadow:0 0 12px #0006;
}

.cycle h2{
  text-align:center;
  margin:6px 0 12px 0;
}

/* Materias */

.subject{
  background:#f4f4f4;
  color:#000;
  padding:10px;
  border-radius:8px;
  margin:8px 0;
  cursor:pointer;
  position:relative;
  transition:.25s;
  font-weight:600;
}

.subject:hover{
  transform:scale(1.04);
}

.subject.locked{
  background:#444;
  color:#aaa;
  cursor:not-allowed;
}

.subject.done{
  background:var(--primary);
  color:#fff;
}

/* Código */

.subject small{
  display:block;
  font-size:11px;
  opacity:.7;
}

/* Tooltip */

.tooltip{
  position:absolute;
  bottom:100%;
  left:0;
  background:#222;
  color:#fff;
  padding:6px;
  border-radius:6px;
  font-size:11px;
  white-space:nowrap;
  opacity:0;
  pointer-events:none;
  transition:.2s;
}

.subject:hover .tooltip{
  opacity:1;
}

/* Porcentaje */

#progressBox{
  position:fixed;
  top:12px;
  right:12px;
  background:#111;
  padding:10px 14px;
  border-radius:10px;
  box-shadow:0 0 10px #000;
  font-weight:bold;
}

/* Botones */

.controls{
  text-align:center;
  padding:30px;
}

button{
  background:var(--primary);
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  margin:6px;
  cursor:pointer;
  font-weight:600;
}

button:hover{
  filter:brightness(1.2);
}

</style>
</head>

<body>

<h1 style="text-align:center;margin-top:20px">
Licenciatura en Administración — UNLP
</h1>

<div id="progressBox">0%</div>

<div id="app" class="container"></div>

<div class="controls">
<button onclick="toggleMode()" id="modeBtn">Modo vertical</button>
<button onclick="resetAll()">Resetear malla</button>
</div>

<script>

/* ---------- DATOS ---------- */

const subjects=[

/* PROPEDÉUTICO */

{c:"8.1.0",n:"Introducción a los Estudios Universitarios",h:48,cor:[],cycle:"Propedéutico"},
{c:"8.1.2",n:"Introducción a la Economía y Estructura Económica Argentina",h:64,cor:[],cycle:"Propedéutico"},
{c:"8.1.3",n:"Administración I",h:128,cor:[],cycle:"Propedéutico"},
{c:"8.1.1",n:"Contabilidad I",h:128,cor:[],cycle:"Propedéutico"},

/* BÁSICO */

{c:"8.1.4",n:"Microeconomía I",h:96,cor:["8.1.2"],cycle:"Básico"},
{c:"8.1.5",n:"Matemática para Administradores",h:96,cor:["8.1.2"],cycle:"Básico"},
{c:"8.1.6",n:"Comportamiento Humano en las Organizaciones",h:64,cor:["8.1.3"],cycle:"Básico"},
{c:"8.1.7",n:"Pensamiento Social y Científico",h:64,cor:["8.1.3"],cycle:"Básico"},

{c:"8.2.2",n:"Macroeconomía I",h:96,cor:["8.1.2"],cycle:"Básico"},
{c:"8.2.1",n:"Interpretación de Estados Contables",h:96,cor:["8.1.1"],cycle:"Básico"},
{c:"8.2.3",n:"Administración Estratégica",h:96,cor:["8.1.3"],cycle:"Básico"},

{c:"8.2.4",n:"Gestión Pública",h:64,cor:["8.1.6"],cycle:"Básico"},
{c:"8.2.5",n:"Estadística Aplicada",h:96,cor:["8.1.5"],cycle:"Básico"},
{c:"8.2.6",n:"Costos para la Gestión",h:64,cor:["8.1.3","8.1.5"],cycle:"Básico"},
{c:"8.2.7",n:"Elementos del Derecho Público y Privado",h:64,cor:["8.1.7"],cycle:"Básico"},

/* PROFESIONAL */

{c:"8.3.1",n:"Marketing Estratégico",h:96,cor:["8.2.3"],cycle:"Profesional"},
{c:"8.3.2",n:"Diseño de Sistemas de Información",h:96,cor:["8.1.7","8.2.3"],cycle:"Profesional"},
{c:"8.3.3",n:"Cálculo Financiero",h:96,cor:["8.1.5","8.2.1","8.2.3"],cycle:"Profesional"},

{c:"8.3.4",n:"Gestión de las Personas I",h:96,cor:["8.1.6","8.2.3"],cycle:"Profesional"},
{c:"8.3.5",n:"Planeamiento y Control Organizacional",h:96,cor:["8.2.1","8.2.3","8.2.6"],cycle:"Profesional"},
{c:"8.3.6",n:"Operaciones",h:96,cor:["8.2.3","8.2.6"],cycle:"Profesional"},

{c:"8.4.1",n:"Marketing Operativo",h:64,cor:["8.2.5","8.3.1"],cycle:"Profesional"},
{c:"8.4.2",n:"Estrategia Tecnológica y Gestión IT",h:64,cor:["8.3.2"],cycle:"Profesional"},
{c:"8.4.3",n:"Finanzas de Empresas",h:96,cor:["8.3.3"],cycle:"Profesional"},

{c:"8.4.6",n:"Gestión de las Personas II",h:64,cor:["8.3.4"],cycle:"Profesional"},
{c:"8.4.7",n:"Derecho Empresario",h:64,cor:["8.2.7"],cycle:"Profesional"},
{c:"8.4.8",n:"Dirección General",h:96,cor:["8.2.6","8.3.1","8.3.3","8.3.5"],cycle:"Profesional"},

/* ELECTIVAS */

{c:"8.4.4",n:"Finanzas Públicas",h:48,cor:["8.1.4","8.1.7"],cycle:"Electivas"},
{c:"8.4.5",n:"Psicosociología Organizacional",h:48,cor:["8.1.6"],cycle:"Electivas"},
{c:"8.4.9",n:"Finanzas Avanzadas",h:48,cor:["8.4.3"],cycle:"Electivas"},
{c:"8.4.10",n:"Inteligencia de Negocios",h:48,cor:["8.2.3","8.2.5"],cycle:"Electivas"},
{c:"OPT",n:"Materia Optativa",h:48,cor:[],cycle:"Electivas"}

];

/* ---------- ESTADO ---------- */

const done=new Set(JSON.parse(localStorage.getItem("done")||"[]"));

function save(){
localStorage.setItem("done",JSON.stringify([...done]));
}

/* ---------- RENDER ---------- */

const app=document.getElementById("app");

function unlocked(s){
return s.cor.every(c=>done.has(c));
}

function render(){

app.innerHTML="";

const cycles=["Propedéutico","Básico","Profesional","Electivas"];

cycles.forEach(cycle=>{

const col=document.createElement("div");
col.className="cycle";

col.innerHTML=`<h2>${cycle}</h2>`;

subjects.filter(s=>s.cycle===cycle).forEach(s=>{

const div=document.createElement("div");
div.className="subject";

if(done.has(s.c)) div.classList.add("done");
else if(!unlocked(s)) div.classList.add("locked");

div.innerHTML=`
<small>${s.c}</small>
${s.n}
<div class="tooltip">
${s.h} hs<br>
Correlativas: ${s.cor.length?s.cor.join(", "):"—"}
</div>
`;

div.onclick=()=>{

if(!unlocked(s) && !done.has(s.c)) return;

if(done.has(s.c)) done.delete(s.c);
else done.add(s.c);

save();
render();
};

col.appendChild(div);

});

app.appendChild(col);

});

updateProgress();
}

/* ---------- PROGRESO ---------- */

function updateProgress(){

const total=subjects.length;
const percent=Math.round(done.size/total*100);

document.getElementById("progressBox").textContent=percent+"%";

}

/* ---------- RESET ---------- */

function resetAll(){

const ok=confirm(
"Se perderán los datos guardados.\n\n¿Deseás resetear la malla?"
);

if(!ok) return;

done.clear();
save();
render();
}

/* ---------- MODO ---------- */

let mobile=false;

function toggleMode(){

mobile=!mobile;

document.body.classList.toggle("mobile");

document.getElementById("modeBtn").textContent=
mobile?"Modo horizontal":"Modo vertical";

}

/* ---------- INIT ---------- */

render();

</script>

</body>
</html>
