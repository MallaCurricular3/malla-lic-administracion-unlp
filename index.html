<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malla Licenciatura en Administración — UNLP</title>

<style>
:root{
  --primary:#540212;
  --primary-soft:#7a0a22;
  --bg:#f7f4f6;
  --card:#ffffff;
  --text:#1c1c1c;
  --locked:#d9d9e6;
  --approved:#e7c9cf;
  --border:#e5d6da;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#121012;
    --card:#1c1719;
    --text:#f1f1f1;
    --locked:#3a3033;
    --approved:#6a2836;
    --border:#2a2225;
  }
}

body{
  margin:0;
  font-family:system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  background:var(--primary);
  color:white;
  text-align:center;
  padding:16px;
  font-weight:600;
}

.container{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

.cycle{
  background:var(--card);
  border:2px solid var(--border);
  border-radius:14px;
  padding:14px;
}

.cycle-title{
  font-weight:700;
  margin-bottom:10px;
  color:var(--primary);
}

.year-title{
  font-weight:600;
  margin:8px 0;
}

.subject{
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  margin-bottom:8px;
  background:var(--card);
  cursor:pointer;
  position:relative;
  transition:.25s;
}

.subject:hover{
  transform:scale(1.02);
}

.subject.locked{
  background:var(--locked);
  cursor:not-allowed;
  opacity:.7;
}

.subject.approved{
  background:var(--approved);
  text-decoration:line-through;
  animation:pop .25s ease;
}

@keyframes pop{
  0%{transform:scale(.9);}
  100%{transform:scale(1);}
}

.tooltip{
  position:absolute;
  bottom:6px;
  right:8px;
  font-size:11px;
  opacity:.7;
}

.stars{
  margin-top:4px;
  font-size:12px;
  color:#e0b400;
}

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:20px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.reset{
  background:#ff5c5c;
  color:white;
}

.mode{
  background:#3aa0ff;
  color:white;
}

.vertical-mode .container{
  grid-template-columns:1fr;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:flex;
  align-items:center;
  justify-content:center;
  visibility:hidden;
}

.modal.active{
  visibility:visible;
}

.modal-box{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  max-width:320px;
  text-align:center;
}
</style>
</head>

<body>

<header>
Licenciatura en Administración — UNLP
</header>

<div class="container" id="grid"></div>

<div class="controls">
  <button class="reset" onclick="confirmReset()">Resetear malla</button>
  <button class="mode" id="modeBtn" onclick="toggleMode()">Modo vertical</button>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div>Se perderán los datos guardados. ¿Confirmar reseteo?</div>
    <button onclick="resetMalla()">Sí, resetear</button>
    <button onclick="closeModal()">Cancelar</button>
  </div>
</div>

<script>
const subjects={

IEU:{n:"Introducción a los Estudios Universitarios",h:48,c:"Propedéutico",y:1,req:[]},
ECON:{n:"Introducción a la Economía",h:64,c:"Propedéutico",y:1,req:[]},
ADMIN1:{n:"Administración I",h:128,c:"Propedéutico",y:1,req:[]},
CONTAB1:{n:"Contabilidad I",h:128,c:"Propedéutico",y:1,req:[]},

MICRO:{n:"Microeconomía I",h:96,c:"Básico",y:1,req:["ECON"]},
MATE:{n:"Matemática",h:96,c:"Básico",y:1,req:["ECON"]},
COMPORT:{n:"Comportamiento Organizacional",h:64,c:"Básico",y:1,req:["ADMIN1"]},

ESTAD:{n:"Estadística",h:96,c:"Básico",y:2,req:["MATE"]},
COSTOS:{n:"Costos",h:64,c:"Básico",y:2,req:["CONTAB1"]},
DERECHO:{n:"Derecho",h:64,c:"Básico",y:2,req:["CONTAB1"]},

FIN:{n:"Finanzas",h:96,c:"Profesional",y:3,req:["ESTAD"]},
MKT:{n:"Marketing",h:96,c:"Profesional",y:3,req:["ADMIN1"]},
SIST:{n:"Sistemas de Información",h:96,c:"Profesional",y:3,req:["ESTAD"]},

DIR:{n:"Dirección General",h:96,c:"Profesional",y:4,req:["FIN"]},

OPT1:{n:"Electiva 1",h:64,c:"Electivas",y:4,req:[]},
OPT2:{n:"Electiva 2",h:64,c:"Electivas",y:4,req:[]}

};

let approved=JSON.parse(localStorage.getItem("approved")||"[]");

function save(){
localStorage.setItem("approved",JSON.stringify(approved));
}

function canUnlock(id){
return subjects[id].req.every(r=>approved.includes(r));
}

function stars(id){
const req=subjects[id].req.length;
const ok=subjects[id].req.filter(r=>approved.includes(r)).length;
return "★".repeat(ok)+"☆".repeat(req-ok);
}

function toggle(id){
if(!canUnlock(id)&&!approved.includes(id))return;

if(approved.includes(id)){
approved=approved.filter(x=>x!==id);
}else{
approved.push(id);
}
save();
render();
}

function render(){

const grid=document.getElementById("grid");
grid.innerHTML="";

const cycles=["Propedéutico","Básico","Profesional","Electivas"];

cycles.forEach(cycle=>{

const div=document.createElement("div");
div.className="cycle";

div.innerHTML=`<div class="cycle-title">${cycle}</div>`;

Object.entries(subjects).forEach(([id,s])=>{

if(s.c===cycle){

const card=document.createElement("div");
card.className="subject";
card.onclick=()=>toggle(id);

if(!canUnlock(id)&&!approved.includes(id))card.classList.add("locked");
if(approved.includes(id))card.classList.add("approved");

card.innerHTML=`
${s.n}
<div class="tooltip">${s.h} hs</div>
<div class="stars">${stars(id)}</div>
`;

div.appendChild(card);

}

});

grid.appendChild(div);

});

}

function toggleMode(){
document.body.classList.toggle("vertical-mode");
const btn=document.getElementById("modeBtn");

if(document.body.classList.contains("vertical-mode")){
btn.textContent="Modo horizontal";
}else{
btn.textContent="Modo vertical";
}
}

function confirmReset(){
document.getElementById("modal").classList.add("active");
}

function closeModal(){
document.getElementById("modal").classList.remove("active");
}

function resetMalla(){
approved=[];
save();
closeModal();
render();
}

render();
</script>

</body>
</html>
