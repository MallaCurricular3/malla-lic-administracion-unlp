<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malla Licenciatura en Administración — UNLP</title>

<style>
:root{
  --bg:#f6f4fb;
  --card:#ffffff;
  --primary:#6b5cff;
  --primary-dark:#5748d6;
  --text:#1c1c1c;
  --locked:#d9d9e6;
  --approved:#b9b3ff;
  --border:#dcdaf7;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#121218;
    --card:#1b1b25;
    --text:#f1f1f1;
    --locked:#3a3a4d;
    --approved:#5c54c9;
    --border:#2a2a3a;
  }
}

body{
  margin:0;
  font-family:system-ui, sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:16px;
  text-align:center;
  background:var(--primary);
  color:white;
  font-weight:600;
}

.controls{
  display:flex;
  gap:10px;
  justify-content:center;
  padding:14px;
  flex-wrap:wrap;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.reset{
  background:#ff5c5c;
  color:white;
}

.vertical{
  background:#3aa0ff;
  color:white;
}

.container{
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:30px;
}

.cycle{
  border:2px solid var(--border);
  border-radius:14px;
  padding:16px;
  background:var(--card);
}

.cycle-title{
  font-weight:700;
  margin-bottom:12px;
  font-size:18px;
}

.year{
  margin-bottom:16px;
}

.year-title{
  font-weight:600;
  margin:10px 0;
}

.semesters{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:12px;
}

.vertical-mode .semesters{
  grid-template-columns:1fr;
}

.subject{
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  background:var(--card);
  cursor:pointer;
  position:relative;
  transition:.2s;
}

.subject:hover{
  transform:scale(1.02);
}

.subject.locked{
  background:var(--locked);
  cursor:not-allowed;
  opacity:.7;
}

.subject.approved{
  background:var(--approved);
  text-decoration:line-through;
}

.tooltip{
  position:absolute;
  bottom:6px;
  right:8px;
  font-size:11px;
  opacity:.7;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:flex;
  align-items:center;
  justify-content:center;
  visibility:hidden;
}

.modal.active{
  visibility:visible;
}

.modal-box{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  max-width:320px;
  text-align:center;
}

.modal-box button{
  margin-top:12px;
}
</style>
</head>

<body>

<header>
Licenciatura en Administración — UNLP
</header>

<div class="controls">
  <button class="reset" onclick="confirmReset()">Resetear malla</button>
  <button class="vertical" onclick="toggleVertical()">Modo vertical</button>
</div>

<div class="container" id="grid"></div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div>Se perderán los datos guardados. ¿Confirmar reseteo?</div>
    <button onclick="resetMalla()">Sí, resetear</button>
    <button onclick="closeModal()">Cancelar</button>
  </div>
</div>

<script>
const subjects = {

  // PROPEDÉUTICO
  IEU:{name:"Introducción a los Estudios Universitarios",hours:48,cycle:"Propedéutico",year:1,sem:1,req:[]},
  ECON:{name:"Introducción a la Economía y Estructura Económica Argentina",hours:64,cycle:"Propedéutico",year:1,sem:1,req:[]},
  ADMIN1:{name:"Administración I",hours:128,cycle:"Propedéutico",year:1,sem:1,req:[]},
  CONTAB1:{name:"Contabilidad I",hours:128,cycle:"Propedéutico",year:1,sem:1,req:[]},

  // BÁSICO
  MICRO:{name:"Microeconomía I",hours:96,cycle:"Básico",year:1,sem:2,req:["ECON"]},
  MATE:{name:"Matemática para Administradores",hours:96,cycle:"Básico",year:1,sem:2,req:["ECON"]},
  COMPORT:{name:"Comportamiento Humano en las Organizaciones",hours:64,cycle:"Básico",year:1,sem:2,req:["ADMIN1"]},
  PENSAMIENTO:{name:"Pensamiento Social y Científico",hours:64,cycle:"Básico",year:1,sem:2,req:["CONTAB1"]},
  MACRO:{name:"Macroeconomía I",hours:96,cycle:"Básico",year:2,sem:1,req:["ECON"]},
  ESTADOS:{name:"Interpretación de Estados Contables",hours:96,cycle:"Básico",year:2,sem:1,req:["CONTAB1"]},
  ESTRAT:{name:"Administración Estratégica",hours:96,cycle:"Básico",year:2,sem:1,req:["ADMIN1"]},
  PUB:{name:"Gestión Pública",hours:64,cycle:"Básico",year:2,sem:2,req:["ADMIN1"]},
  ESTAD:{name:"Estadística Aplicada",hours:96,cycle:"Básico",year:2,sem:2,req:["MATE"]},
  COSTOS:{name:"Costos para la Gestión",hours:64,cycle:"Básico",year:2,sem:2,req:["CONTAB1","MATE"]},
  DERECHO:{name:"Elementos del Derecho Público y Privado",hours:64,cycle:"Básico",year:2,sem:2,req:["CONTAB1"]},

  // PROFESIONAL
  MKT:{name:"Marketing Estratégico",hours:96,cycle:"Profesional",year:3,sem:1,req:["ESTRAT"]},
  SIST:{name:"Diseño de Sistemas de Información",hours:96,cycle:"Profesional",year:3,sem:1,req:["ESTAD"]},
  FIN:{name:"Cálculo Financiero",hours:96,cycle:"Profesional",year:3,sem:1,req:["MATE","ESTADOS","ESTRAT"]},
  GEST1:{name:"Gestión de las Personas I",hours:96,cycle:"Profesional",year:3,sem:2,req:["COMPORT"]},
  PLAN:{name:"Planeamiento y Control Organizacional",hours:96,cycle:"Profesional",year:3,sem:2,req:["ESTRAT"]},
  OP:{name:"Operaciones",hours:96,cycle:"Profesional",year:3,sem:2,req:["ESTAD","COSTOS"]},

  MKTOP:{name:"Marketing Operativo",hours:64,cycle:"Profesional",year:4,sem:1,req:["MKT"]},
  PROY:{name:"Estrategia Tecnológica y Gestión de Proyectos IT",hours:64,cycle:"Profesional",year:4,sem:1,req:["SIST"]},
  FINEMP:{name:"Finanzas de Empresas",hours:96,cycle:"Profesional",year:4,sem:1,req:["FIN"]},
  FINPUB:{name:"Finanzas Públicas",hours:48,cycle:"Profesional",year:4,sem:1,req:["CONTAB1","DERECHO"]},
  PSICO:{name:"Psicosociología Organizacional",hours:48,cycle:"Profesional",year:4,sem:1,req:["GEST1"]},
  GEST2:{name:"Gestión de las Personas II",hours:64,cycle:"Profesional",year:4,sem:2,req:["GEST1"]},
  DEREMP:{name:"Derecho Empresario",hours:64,cycle:"Profesional",year:4,sem:2,req:["DERECHO"]},
  DIR:{name:"Dirección General",hours:96,cycle:"Profesional",year:4,sem:2,req:["PLAN","FINEMP"]},
  FINAV:{name:"Finanzas Avanzadas",hours:48,cycle:"Profesional",year:4,sem:2,req:["FINEMP"]},
  INTEL:{name:"Inteligencia de Negocios y Análisis de Datos",hours:48,cycle:"Profesional",year:4,sem:2,req:["ESTAD","COSTOS"]},
};

let approved = JSON.parse(localStorage.getItem("approved") || "[]");

function save(){
  localStorage.setItem("approved",JSON.stringify(approved));
}

function canUnlock(id){
  return subjects[id].req.every(r=>approved.includes(r));
}

function toggle(id){
  if(!canUnlock(id) && !approved.includes(id)) return;

  if(approved.includes(id)){
    approved = approved.filter(x=>x!==id);
  }else{
    approved.push(id);
  }
  save();
  render();
}

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML="";

  const cycles = ["Propedéutico","Básico","Profesional"];

  cycles.forEach(cycle=>{
    const div = document.createElement("div");
    div.className="cycle";

    const title=document.createElement("div");
    title.className="cycle-title";
    title.textContent=cycle;
    div.appendChild(title);

    for(let y=1;y<=4;y++){
      const yearDiv=document.createElement("div");
      yearDiv.className="year";

      const yearTitle=document.createElement("div");
      yearTitle.className="year-title";
      yearTitle.textContent=`Año ${y}`;
      yearDiv.appendChild(yearTitle);

      const semDiv=document.createElement("div");
      semDiv.className="semesters";

      Object.entries(subjects).forEach(([id,s])=>{
        if(s.cycle===cycle && s.year===y){
          const card=document.createElement("div");
          card.className="subject";
          card.onclick=()=>toggle(id);

          if(!canUnlock(id) && !approved.includes(id)) card.classList.add("locked");
          if(approved.includes(id)) card.classList.add("approved");

          card.innerHTML=`${s.name}
            <div class="tooltip">${s.hours} hs</div>
          `;

          semDiv.appendChild(card);
        }
      });

      if(semDiv.children.length){
        yearDiv.appendChild(semDiv);
        div.appendChild(yearDiv);
      }
    }

    grid.appendChild(div);
  });
}

function confirmReset(){
  document.getElementById("modal").classList.add("active");
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

function resetMalla(){
  approved=[];
  save();
  closeModal();
  render();
}

function toggleVertical(){
  document.body.classList.toggle("vertical-mode");
}

render();
</script>

</body>
</html>
